#import "./entryFragment.graphql"
query germplasmEntries(
    $entryIds: [Int!]
    $names: [String!]
) {
    germplasmEntries(
        entryIds: $entryIds
        names: $names
    ){
        status
        result {
            ...GermplasmEntryFields
        }
        errors {
            message
        }
    }
}