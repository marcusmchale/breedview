schema {
  query: Query
  mutation: Mutation
}
scalar DateTime
type File {
  id: Int
  filename: String!
  mimetype: String!
  encoding: String!
  path: String!
}
type Mutation {
  add_account(name: String!, fullname: String, email: String!, password: String!): BooleanPayload!
  edit_user(name: String, fullname: String, email: String, password: String): BooleanPayload!
  verify_email(token: String!): BooleanPayload!
  request_password_reset(email: String!): BooleanPayload
  reset_password(token: String!, password: String!): BooleanPayload!
  login(username: String!, password: String!): BooleanPayload!
  logout: BooleanPayload!
  add_email(email: String!): BooleanPayload!
  remove_email(email: String!): BooleanPayload!
  request_affiliation(team: Int!, access: Access!, heritable: Boolean): BooleanPayload!
  approve_affiliation(user: Int!, team: Int!, access: Access!, heritable: Boolean): BooleanPayload!
  remove_affiliation(team: Int!, access: Access!): BooleanPayload!
  revoke_affiliation(user: Int!, team: Int!, access: Access!): BooleanPayload!
  add_layout(layout: LayoutInput!): BooleanPayload!
  blocks_add_unit(unit: UnitInput!): BooleanPayload!
  blocks_add_position(unit_id: Int!, position: PositionInput): BooleanPayload!
  "For each dataset the term is the Variable/Condition or Event from the Ontology to which this data corresponds"
  data_add_dataset(term: Int!): BooleanPayload!
  data_add_record(record: RecordInput): BooleanPayload!
  ontology_add_entry(entry: OntologyEntryInput): BooleanPayload!
  add_team(name: String!, fullname: String, parent: Int): BooleanPayload!
  remove_team(team: Int!): BooleanPayload!
  edit_team(team: Int!, name: String, fullname: String): BooleanPayload!
  add_location(location: LocationInput!): BooleanPayload!
}
type User {
  id: Int!
  name: String!
  fullname: String!
  email: String!
}
type Account {
  user: User!
  allowed_emails: [String]
  allowed_users: [User]
}
type Layout {
  id: Int!
  name: String!
  type: OntologyEntry!
  axes: [String]
  parent: Layout
  "Position within parent layout"
  position: [String]
  children: [Layout]
  release: Release
}
type Token {
  access_token: String!
  token_type: String!
}
type Position {
  "ID of Location in a Region"
  location: Int!
  "ID of Layout in and Arrangement"
  layout: Int
  "Coordinates should be a list of values corresponding to the stored layout axes."
  coordinates: [String]
  start: DateTime
  end: DateTime
}
type Unit {
  id: Int!
  subject: OntologyEntry
  name: String
  synonyms: [String]
  description: String
  positions: [Position]
  parents: [Unit]
  children: [Unit]
  release: Release
}
type Record {
  id: Int!
  unit: Unit
  value: String
  start: DateTime
  end: DateTime
  references: [Int]
  submitted: DateTime
}
type DataSet {
  id: Int!
  term: OntologyEntry
  records: [Record]
  contributors: [Int]
  references: [Int]
}
type Version {
  id: Int!
  major: Int!
  minor: Int!
  patch: Int!
  comment: String!
}
type OntologyEntry {
  """
  Ontology Version that the entry was retrieved from.
  For current terms this will be the latest ontology version.
  For retired terms it will be the last ontology version they were seen in.
  """
  version: Version!
  label: OntologyLabel!
  id: Int!
  name: String!
  description: String
  abbreviation: String
  synonyms: [String]
  authors: [Int]
  references: [Int]
  parents: [OntologyEntry]
  children: [OntologyEntry]
  "Either ObservationMethodType for ObservationMethod, or ScaleType for Scale"
  scale_type: ScaleType
  observation_type: ObservationMethodType
  "Subjects for trait"
  subjects: [OntologyEntry]
  "Categories for scale"
  categories: [OntologyEntry]
  "Trait for variable"
  trait: OntologyEntry
  "Condition for parameter"
  condition: OntologyEntry
  "Exposure for event"
  exposure: OntologyEntry
  "Either ControlMethod or ObservationMethod for variable/parameter/event"
  method: OntologyEntry
  "Scale for variable/parameter/event"
  scale: OntologyEntry
  "Rank for ordinal scale categories"
  rank: Int
  "Axes for layout type"
  axes: [AxisType]
}
type Affiliation {
  user: User
  authorisation: Authorisation
  heritable: Boolean!
}
type Affiliations {
  read: [Affiliation]
  write: [Affiliation]
  admin: [Affiliation]
  curate: [Affiliation]
}
type Team {
  id: Int!
  name: String!
  fullname: String!
  parent: Team
  children: [Team]
  affiliations: Affiliations
}
type Error {
  name: String!
  message: String!
}
type BooleanPayload {
  status: QueryStatus!
  result: Boolean
  errors: [Error]
}
type LoginPayload {
  status: QueryStatus!
  result: Token
  errors: [Error]
}
type TeamsPayload {
  status: QueryStatus!
  result: [Team]
  errors: [Error]
}
type TeamPayload {
  status: QueryStatus!
  result: Team
  errors: [Error]
}
type AffiliationsPayload {
  status: QueryStatus!
  result: Affiliations
  errors: [Error]
}
type AccountPayload {
  status: QueryStatus!
  result: Account
  errors: [Error]
}
type UsersPayload {
  status: QueryStatus!
  result: [User]
  errors: [Error]
}
type VersionPayload {
  status: QueryStatus!
  result: Version
  errors: [Error]
}
type OntologyEntryPayload {
  status: QueryStatus!
  result: OntologyEntry
  errors: [Error]
}
type OntologyEntriesPayload {
  status: QueryStatus!
  result: [OntologyEntry]
  errors: [Error]
}
type LocationsPayload {
  status: QueryStatus!
  result: [Location]
  errors: [Error]
}
type LocationPayload {
  status: QueryStatus!
  result: Location
  errors: [Error]
}
type LayoutsPayload {
  status: QueryStatus!
  result: [Layout]
  errors: [Error]
}
type LayoutPayload {
  status: QueryStatus!
  result: Layout
  errors: [Error]
}
type UnitsPayload {
  status: QueryStatus!
  result: [Unit]
  errors: [Error]
}
type UnitPayload {
  status: QueryStatus!
  result: Unit
  errors: [Error]
}
type DatasetsPayload {
  status: QueryStatus!
  result: [DataSet]
  errors: [Error]
}
type Query {
  "Get own account details for administrative tasks"
  account: AccountPayload!
  "Get user details for administrative tasks"
  users(user_id: Int): UsersPayload!
  """
  Get a list of organisation "root" teams.
  These are top-level team in the organisation hierarchy.
  Visibility of teams within an organisation is dependent on controls, read-release and affiliations.
  Navigation of the organisation graph is achieved by resolvers on the parent/children attributes.
  """
  organisations: TeamsPayload!
  """
  Get a single team details
  As with organisations, the organisation can be explored from this node.
  """
  team(team_id: Int!): TeamPayload!
  """
  Get a multiple team details
  """
  teams (team_ids: [Int!]): TeamsPayload! # see team
  """Get affiliations that result from heritable affiliations to parent teams"""
  inherited_affiliations(team_id: Int!): AffiliationsPayload!
  "Get the latest ontology version"
  ontology_version(entry_id: Int, entry_name: String): VersionPayload!
  "Get an ontology entry"
  ontology_entry(entry_id: Int!): OntologyEntryPayload
  "Get a list of ontology entries"
  ontology_entries(name: String, label: OntologyLabel): OntologyEntriesPayload
  "Get a list of countries for use in top level region creation"
  countries: LocationsPayload!
  """
  Get a list of region "root" locations.
  These are all countries that form the top-level location in the region.
  """
  regions: LocationsPayload!
  "Get a single location details"
  location(location_id: Int!): LocationPayload!
  """
  Get a list of arrangement roots.
  These are all layouts that form the top-level layout in an arrangement.
  Optionally retrieve only those at a given location by supplying location_id.
  """
  arrangements(location_id: Int): LayoutsPayload!
  "Get a single layout details"
  layout(layout_id: Int!): LayoutPayload!
  """
  Get a list of block "root" units.
  These are top-level unit in the block hierarchy.
  """
  blocks(location_id: Int): UnitsPayload
  "Get a single unit."
  unit(unit_id: Int!): UnitPayload
  datasets(dataset_id: Int, term_id: Int): DatasetsPayload
}
type GeoCoordinate {
  "Latitude in degrees according to ISO 6709"
  latitude: Float!
  "Longitude in degrees according to ISO 6709"
  longitude: Float!
  "Meters above WGS84 reference ellipsoid"
  altitude: Float
  "Uncertainty in meters associated with these coordinates"
  uncertainty: Float
  "Additional coordinate description"
  description: String
}
type Location {
  """
  ID is not always required for location
  We return Country LocationInputs that are not yet stored using this type
  """
  id: Int
  name: String!
  type: OntologyEntry!
  code: String
  synonyms: [String]
  description: String
  address: String
  coordinates: [GeoCoordinate]
  parent: Location
  children: [Location]
  release: Release
}
"""
Ontology entries form a directed acyclic graph with source and sink
relationships described for each node as arents and children.
Each entry has an OntologyLabel to distinguish various classes of entry.
Contributions for some entry classes requires additional parameters (detailed below).
"""
enum OntologyLabel {
  """
  Term entries may be used to relate other key terms in the ontology.
  Example: "Metabolism" may be a term.
  """
  Term
  """
  Subject entries describe Units (see Blocks) being observed in a study.
  These are linked to Unit and Trait.
  Examples: "Leaf", "Tree", "Field", "Rhizosphere"
  """
  Subject
  """
  Scale entries describe units or classes used for values in a Dataset.
  These are linked to Variable, Parameter or Event.
  Scale entries require a ScaleType.
  For Nominal and Ordinal types, additional Category references may be provided.
  Examples:
  "Centimeters", "Counts per million", "Micro-Einsteins" are all ScaleType numerical.
  "Plant Genetic Material" is ScaleType nominal, and categories should include references to GermplasmEntries.
  """
  Scale
  """
  Category entries describe classes for Scale entries with type Nominal or Ordinal.
  These are linked to Scale entries.
  Ordinal scales require a "rank" parameter for each category.
  Examples: "High", "Medium", "Low" with ranks 2, 1 and 0, respectively.
  """
  Category
  """
  Observation method entries describe the way a value is determined.
  These are linked to Variable or Event.
  Observation method entries require an ObservationMethodType.
  Examples: "Distance measurement with calibrated reference", "Short-read sequencing", "Rain Gauge".
  """
  ObservationMethod
  """
  Trait entries describe observed properties of a subject (phenotype for a plant subject)
  These are linked to Variable and Subject.
  Examples:
  "Height", "Gene expression" linked to a tree subject.
  """
  Trait
  """
  Variable entries link a Trait, ObservationMethod and Scale
  to form a single reference term for a Dataset (see Datasets).
  Examples:
  "Tree height" where:
      Trait = "Height",
      Method = "Distance measurement with calibrated reference",
      Scale = "Centimeters".
  "Normalised Expression" where:
      Trait = "Gene expression",
      Method = "Short read sequencing",
      Scale = "Counts per million"
  """
  Variable
  """
  Control method entries describe the way a value is maintained for an experiment.
  These are linked to Parameter or Event.
  Examples: "Fluorescent Lighting", "Fertilizer application", "Germplasm selection"
  """
  ControlMethod
  """
  Condition entries describe the quantities/qualities that are fixed/controlled throughout an experiment.
  These are linked to Parameter or Event entries.
  Examples: "Light level", "Controlled Grafting", "Water availability"
  """
  Condition
  """
  Parameter entries link a Condition, ControlMethod and Scale
  to form a single entry for a Dataset (see Datasets).
  Examples:
  "Controlled lighting" where:
      Condition = "Light level", ControlMethod = "Fluorescent lighting", Scale = "Micro Einsteins"
  OR
  "Controlled water availability" where:
      Condition = "Water availability", ControlMethod = "Controlled water application", Scale = "L/m2/day"
  OR
  "Grafted Material" where:
      Condition = "Genetic material", ControlMethod = "Controlled Grafting", Scale = "Plant Genetic Material"
  """
  Parameter
  """
  Exposure entries describe temporary occurrences within an experimental setting.
  These are linked to Event entries.
  Examples:
  "Fertilizer application", "Rainfall"
  """
  Exposure
  """
  Event entries link an Exposure, ObservationMethod and Scale
  to form a single entry for a Dataset (see Datasets).
  Examples:
  "Pellet Fertilizer Application" where:
      Exposure = "Fertilizer application", Method = "Pellet Dispersion", Scale = "kg/ha"
  """
  Event
  """
  Germplasm method entries describe maintenance or sourcing of germplasm.
  These are linked to GermplasmEntry (see Germplasms).
  Examples: "Controlled cross", "Mutagenesis", "Ecological survey"
  """
  GermplasmMethod
  """
  LocationType entries describe types of locations.
  These are linked to Location (see Regions).
  Examples: "Country", "State", "Field"
  """
  LocationType
  """
  LayoutType entries describe types of arrangements.
  These are linked to Layout (see Arrangements).
  Examples: "Grid", "Rows"
  """
  LayoutType
  """
  Design entries describe statistical designs for a study.
  These are linked to Study (see Programs).
  Examples: "Split-plot", "Randomized block"
  """
  Design
  """
  Role entries describe roles for people.
  These are linked to Person (see People).
  Examples: "Post-doctoral researcher", "Principal Investigator"
  """
  Role
  """
  Title entries describe titles for people.
  These are linked to Person (see People).
  Examples: "Professor", "Doctor"
  """
  Title
}
enum AxisType {
  """
  String values with no implied directional relationship
  e.g. Growth Facility
  """
  NOMINAL
  """
  String values values that convey a sequence.
  e.g. Row number
  """
  ORDINAL
  """
  Numeric values that convey position within Euclidean space.
  This may be a curvilinear/affine space with unknown transformations.
  e.g. Distance from start of row when rows follow the surface topology.
  """
  COORDINATE
  """
  Cartesian coordinates are a subset of the AxisType.COORDINATE that additionally allow distance calculations.
  AxisType.CARTESIAN should be preferred when the coordinate space is approximately Cartesian,
  i.e. all axes noted as AxisType.CARTESIAN for a given layout must:
   - be pair-wise perpendicular,
   - have a common origin,
   - and common unit of length.
  e.g. Distance from start of row when rows lines are straight and perpendicular to the row axis.
  """
  CARTESIAN
}
enum ObservationMethodType {
  MEASUREMENT
  COUNTING
  ESTIMATION
  COMPUTATION
  PREDICTION
  DESCRIPTION
  CLASSIFICATION
}
enum ScaleType {
  DATE
  DURATION
  NUMERICAL
  NOMINAL
  ORDINAL
  TEXT
  germplasm
}
enum Access {
  READ
  WRITE
  ADMIN
  CURATE
}
enum Authorisation {
  REQUESTED
  AUTHORISED
  REVOKED
}
enum QueryStatus {
  SUCCESS
  NOT_FOUND
  ERROR
}
enum Release {
  PRIVATE
  REGISTERED
  PUBLIC
}
input LayoutInput {
  " Location ID from Region "
  location: Int!
  " Ontology LayoutType identifier "
  type: Int!
  " Axis labels "
  axes: [String!]
  " Optional name for the layout "
  name: String
  " Optional parent layout to construct multiplexed layout arrangements"
  parent: Int
  " When parent is supplied, position according to parent layout axes must be provided."
  position: [String]
  " Read access to this layout "
  release: Release
}
input PositionInput {
  "ID of Location in a Region"
  location: Int!
  "ID of Layout in and Arrangement"
  layout: Int
  "Coordinates should be a list of values corresponding to the stored layout axes."
  coordinates: [String]
  start: DateTime
  end: DateTime
}
input UnitInput {
  "ID of Subject in the ontology"
  subject: Int!
  name: String
  synonyms: [String]
  description: String
  "IDs of parent Units, of which this unit forms a component"
  parents: [Int]
  "IDs of child Units, which represent a component of this unit."
  children: [Int]
  release: Release
}
input RecordInput {
  dataset: Int!
  unit: Int!
  value: String
  start: DateTime
  end: DateTime
  references: [Int]
}
input OntologyEntryInput {
  label: OntologyLabel!
  name: String!
  description: String
  abbreviation: String
  synonyms: [String]
  "People stored in the database that established this entry"
  authors: [Int]
  "References stored in the database for additional details, e.g. a link to another ontology."
  references: [Int]
  """
  To establish a hierarchy and relationships among terms.
  Parents or children may be defined for any entry.
  """
  parents: [Int]
  children: [Int]
  """
  Scale and ObservationMethod entries require an additional type parameter,
  ScaleType or ObservationMethodType respectively.
  """
  scale_type: ScaleType
  observation_type: ObservationMethodType
  "When defining a scale using existing categories, their identifiers may be listed in their proposed rank order."
  categories: [Int]
  "When defining a Variable, Parameter or Event, a Scale identifier is required."
  scale: Int
  "When creating a category for an ordinal scale, a rank must be provided."
  rank: Int
  "When creating a trait, subjects must be specified by ID"
  subjects: [Int]
  "When creating a variable, a Trait identifier is required."
  trait: Int
  """
  When defining a Variable an ObservationMethod is required.
  When defining a Parameter a ControlMethod identifier is required.
  When defining an Event, either ObservationMethod or ControlMethod is required.
  """
  method: Int
  "When creating a parameter, a Condition identifier is required."
  condition: Int
  "When creating an Event, an Exposure identifier is required."
  exposure: Int
  "When creating a LayoutType, each axis type for position descriptions is required"
  axes: [AxisType]
}
input GeoCoordinateInput {
  "Latitude in degrees according to ISO 6709"
  latitude: Float!
  "Longitude in degrees according to ISO 6709"
  longitude: Float!
  "Meters above WGS84 reference ellipsoid"
  altitude: Float
  "Uncertainty in meters associated with these coordinates"
  uncertainty: Float
  "Additional coordinate description"
  description: String
}
input LocationInput {
  name: String!
  synonyms: [String]
  " Optional code for location, e.g. zip-code "
  code: String
  description: String
  address: String
  coordinates: [GeoCoordinateInput]
  " Ontology LocationType identifier "
  type: Int!
  " A parent location, required unless a country (see countries) "
  parent: Int
  release: Release
}
"Exposes a URL that specifies the behaviour of this scalar."
directive @specifiedBy(
    "The URL that specifies the behaviour of this scalar."
    url: String!
  ) on SCALAR

