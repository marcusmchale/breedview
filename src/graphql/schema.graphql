input LayoutInput {
  """ Location ID from Region """
  locationId: Int!

  """ Ontology LayoutType identifier """
  typeId: Int!

  """ Axis labels """
  axes: [String!]

  """ Optional name for the layout """
  name: String

  """ Optional parent layout to construct multiplexed layout arrangements"""
  parentId: Int

  """ When parent is supplied, position according to parent layout axes must be provided.
  """
  position: [String]
}

input LayoutUpdate {
  layoutId: Int!
  locationId: Int
  typeId: Int
  axes: [String!]
  name: String
  parentId: Int
  position: [String]
}

input PositionInput {
  """ID of Location in a Region"""
  locationId: Int!

  """ID of Layout in and Arrangement"""
  layoutId: Int

  """
  Coordinates should be a list of values corresponding to the stored layout axes.
  """
  coordinates: [String]
  start: DateTime
  end: DateTime
}

input UnitInput {
  """ID of Subject in the ontology"""
  subjectId: Int!
  germplasmId: Int
  name: String
  description: String

  """IDs of parent Units, of which this unit forms a component"""
  parentIds: [Int]

  """IDs of child Units, which represent a component of this unit."""
  childrenIds: [Int]
}

input UnitUpdate {
  unitId: Int!
  subjectId: Int
  germplasmId: Int
  name: String
  description: String
  parentIds: [Int]
  childrenIds: [Int]
}

input RecordInput {
  unitId: Int!
  value: String
  start: DateTime
  end: DateTime
  referenceIds: [Int]
}

input RecordUpdate {
  recordId: Int!
  unitId: Int
  value: String
  start: DateTime
  end: DateTime
  referenceIds: [Int]
}

input DatasetInput {
  studyId: Int!
  """ concept is either a Factor or Variable in the ontology """
  conceptId: Int!
  records: [RecordInput]
  contributorIds: [Int!]
  referenceIds: [Int!]
}

input DatasetUpdate {
  """Optionally provide a list of records to update"""
  datasetId: Int!
  studyId: Int
  conceptId: Int
  records: [RecordUpdate]
  contributorIds: [Int!]
  referenceIds: [Int!]
}

enum Reproduction {
  CLONAL
  SEXUAL
  APOMIXIS
}

enum GermplasmSourceType {
  UNKNOWN
  SEED
  TISSUE
  MATERNAL
  PATERNAL
}

input GermplasmSourceRelationship {
  sourceId: Int!
  sourceType: GermplasmSourceType!
  description: String
}

input GermplasmSinkRelationship {
  sinkId: Int!
  sourceType: GermplasmSourceType!
  description: String
}

input GermplasmInput {
  name: String!
  description: String
  synonyms: [String!]

  """Place of origin, a reference to a Location stored in Regions"""
  originId: Int

  """Time sourced from origin"""
  time: DateTime

  """
  Reproduction of germplasm, summarises the genetic impacts/requirements for maintenance
  """
  reproduction: Reproduction

  """
  Control methods (referenced in the ontology) to provide further details about how this germplasm is maintained
  """
  controlMethodIds: [Int!]

  """Authors of this germplasm entry (A list of personId)"""
  authorIds: [Int!] = []

  """References for ths germplasm entry (A list of referenceId)"""
  referenceIds: [Int!] = []

  """Source relationships"""
  sources: [GermplasmSourceRelationship!]

  """Sink relationships"""
  sinks: [GermplasmSinkRelationship!]
}

input GermplasmUpdate {
  id: Int!
  name: String
  description: String
  synonyms: [String!]
  originId: Int
  time: DateTime
  reproduction: Reproduction
  controlMethodIds: [Int!]
  authorIds: [Int] = []
  referenceIds: [Int] = []
  sources: [GermplasmSourceRelationship!]
  sinks: [GermplasmSinkRelationship!]
}

