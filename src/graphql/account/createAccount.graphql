mutation accountsCreateAccount(
    $name: String!,
    $fullname: String!,
    $email: String!,
    $password: String!
) {
    accountsCreateAccount(
        name: $name,
        fullname: $fullname,
        email: $email,
        password: $password
    ) {
        status
        errors {
            message
        }
    }
}