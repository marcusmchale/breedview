#import "./recordFragment.graphql"
query DatasetSubmissionWithData($submissionId: String!) {
  datasetsSubmission(submissionId: $submissionId) {
    status
    result {
      data {
        conceptId
        records {
          ...RecordFields
        }
        contributors {
          id
          name
        }
        references {
          id
        }
      }
      datasetId
      status
      errors
      itemErrors {
        index
        error
      }
    }
    errors {
      name
      message
    }
  }
}