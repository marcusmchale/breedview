#import "./recordFragment.graphql"
query Datasets($studyIds: [Int!], $conceptIds: [Int!], $datasetIds: [Int!]) {
  datasets(studyIds: $studyIds, conceptIds: $conceptIds, datasetIds: $datasetIds) {
    status
    result {
      id
      concept {
        id
        name
        ... on Variable {
          scale {
            id
            name
            scaleType
            categories {
              id
              name
            }
          }
        }
        ... on Factor {
          scale {
            id
            name
            scaleType
            categories {
              id
              name
            }
          }
        }
      }
      records {
        ...RecordFields
      }
      contributors {
        id
        name
      }
      references {
        id
      }
    }
    errors {
      name
      message
    }
  }
}