query programs($programId: Int, $trialId: Int, $studyId: Int) {
  programs(programId: $programId, trialId: $trialId, studyId: $studyId) {
    status
    result {
      id
      name
      fullname
      description
      contacts {id}
      references {id}
      trials {
        id
        name
        fullname
        description
        start
        end
        contacts {id}
        references {id}
        studies {
          id
          name
          fullname
          description
          externalId
          practices
          start
          end
          factors {id}
          observations {id}
          design {id}
          licence {id}
          references {id}
        }
      }
    }
    errors {
      message
    }
  }
}
