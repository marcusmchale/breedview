query locations (
    $locationIds: [Int!]!
){
    regionsLocations(
        locationIds: $locationIds
    ){
        status
        result {
            id
            name
            code
            type {id, name}
            description
            address
            coordinates {latitude, longitude}
            parent {id}
            children {id}
        }
        errors {
            message
        }
    }
}