query blocks ($locationId: Int) {
    blocks (locationId: $locationId) {
        status
        result {
            id
            subject {name, id}
            name
            description
            positions {
                location {name, id}
                layout {id, name, type {id, name}}
                coordinates
                start
                end
            }
            children {id}
        }
        errors {
            message
        }
    }
}