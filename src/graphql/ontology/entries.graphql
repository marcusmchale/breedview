#import "./entryFragment.graphql"
query ontologyEntries(
    $entryIds: [Int!]
    $labels: [OntologyEntryLabel!]
    $versionId: Int
) {
    ontologyEntries(
        entryIds: $entryIds
        labels: $labels
        versionId: $versionId
    ){
        status
        result {
            ...OntologyEntryFields
        }
        errors {
            message
        }
    }
}